### ❗实盘前必须补齐的 4 个“致命拼图”

**1. 交易规则与精度自适应（最容易导致下单失败）**
* **骨架现状：** 代码里简单用了 round(qty, 3) 和 round(price, 2)。
* **实盘现实：** Binance 对每个交易对都有极严格的 LOT_SIZE（数量精度，如只能买 0.001 个 BTC，但可以买 1 个 DOGE）和 PRICE_FILTER（价格精度）。如果你的量化计算出下单 0.1234 个某币种，但该币种要求精度是小数点后 2 位，Binance API 会直接报错 Precision is over the maximum defined，导致你的突破做空信号被完美错过。
* **必须补齐：** 启动时动态拉取 exchangeInfo 接口，写一个全局的精度格式化工具类，每次下单前自动对齐。

**2. 异步并发与阻塞问题（最容易导致卡死）**
* **骨架现状：** 使用了 time.sleep() 和同步的 Client 进行 API 请求。
* **实盘现实：** 在多币种扫描和 WebSocket 实时监听中，同步请求是灾难。如果你扫 50 个币的 K 线，网络稍微波动一下，主线程就会卡住几秒甚至十几秒。这不仅会导致漏掉瞬时信号，还会让你的风控模块（Order Guard）失效。
* **必须补齐：** 必须使用 asyncio 配合 BinanceAsyncClient，将网络请求全部改成异步，确保扫描、监听和下单互不干扰。

**3. WebSocket 的网络健壮性（最容易导致裸奔）**
* **骨架现状：** 给了一个基础的 websocket.WebSocketApp。
* **实盘现实：** 交易所的 WebSocket 链接非常容易断开（Binance 每 24 小时强制断开一次，平时也会因网络抖动断开）。如果断开后没有自动重连机制，你的系统就会“瞎掉”，以为没有行情，从而抱着错误仓位等死。
* **必须补齐：** 增加带指数退避算法的断线重连机制（Ping/Pong 守护进程）。

**4. 极端的 API 限频保护（Rate Limits）**
* **骨架现状：** 循环里不断调用 API。
* **实盘现实：** Binance 有严格的 IP 访问频率限制（Weight Limits）。如果你的 Scanner 扫得太快，或者报错后无限死循环重试，IP 会被封禁 2 分钟到 3 天不等。
* **必须补齐：** 增加请求权重计数器（Weight Tracker）和全局的 Try-Catch 异常捕获机制。

