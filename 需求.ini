# core/risk_manager.py
# ============================================
# 风控模块（仓位计算）
# ============================================

class RiskManager:
    def __init__(self, config):
        self.config = config

        # 初始资金（模拟）
        self.balance = config.get("balance", 1000)

        # 单笔风险比例
        self.risk_per_trade = config["risk"]["risk_per_trade"]

    # ============================================
    # 计算仓位
    # ============================================
    def calculate_position(self, signal):
        entry = signal["entry"]
        stop = signal["stop"]

        # 每笔允许亏损金额
        risk_amount = self.balance * self.risk_per_trade

        # 每单位亏损
        loss_per_unit = abs(entry - stop)

        if loss_per_unit == 0:
            return {"size": 0, "entry": entry, "stop": stop}

        size = risk_amount / loss_per_unit

        return {
            "size": size,
            "entry": entry,
            "stop": stop
        }
