特别是**期望值（Expectancy）**和**最大连亏（Max Loss Streak）**：
* 期望值直接决定了这个系统是不是个“印钞机”（只要是正的，跑得越久赚得越多）。
* 最大连亏直接决定了“我这个人类能不能扛得住”。哪怕期望值是正的，如果连亏 10 笔，大部分人在第 8 笔的时候就已经手动把程序关了，倒在黎明前。

我直接把这 3 个核心指标和**自动诊断逻辑**揉进代码里，生成**终极实盘看板 V2**。

### 📊 终极实盘看板 V2 (dashboard.py)

你可以直接用这段代码替换之前的版本：


python
import pandas as pd
import numpy as np
import os
from tabulate import tabulate

class TradeDashboard:
    def __init__(self, file_path="trades.csv"):
        self.file_path = file_path
        if not os.path.exists(self.file_path):
            print("⚠️ 还没有交易数据，请先让系统跑一会！")
            self.df = pd.DataFrame()
        else:
            self.df = pd.read_csv(self.file_path)
            
    def run_analysis(self):
        if self.df.empty:
            return

        print("\n" + "="*50)
        print("🚀 狙击系统核心指标看板 V2 (实盘级)")
        print("="*50)

        # --- 1. 基础大盘数据 ---
        total_trades = len(self.df)
        wins = len(self.df[self.df["pnl"] > 0])
        losses = len(self.df[self.df["pnl"] <= 0])
        
        win_rate = (wins / total_trades) * 100 if total_trades > 0 else 0
        total_pnl = self.df["pnl"].sum()
        
        avg_win = self.df[self.df["pnl"] > 0]["pnl"].mean() if wins > 0 else 0
        avg_loss = abs(self.df[self.df["pnl"] <= 0]["pnl"].mean()) if losses > 0 else 0
        rr_ratio = avg_win / avg_loss if avg_loss > 0 else float('inf')

        # --- 2. 核心交易决策指标 (新增) ---
        # 期望值 Expectancy
        expectancy = (win_rate/100 * avg_win) - ((1 - win_rate/100) * avg_loss)
        
        # 利润因子 Profit Factor
        total_win_amt = self.df[self.df["pnl"] > 0]["pnl"].sum()
        total_loss_amt = abs(self.df[self.df["pnl"] <= 0]["pnl"].sum())
        pf = total_win_amt / total_loss_amt if total_loss_amt > 0 else float('inf')
        
        # 最大连亏 Max Loss Streak
        loss_streak = (self.df["pnl"] <= 0).astype(int)
        max_loss_streak = loss_streak.groupby((loss_streak != loss_streak.shift()).cumsum()).cumsum().max()

        # 最大回撤 Max Drawdown
        cumulative_pnl = self.df["pnl"].cumsum()
        peak = cumulative_pnl.cummax()
        drawdown = peak - cumulative_pnl
        max_drawdown = drawdown.max()

        summary_data = [
            ["总交易笔数", f"{total_trades} 笔"],
            ["胜率 (Win Rate)", f"{win_rate:.2f}%"],
            ["盈亏比 (R:R)", f"{rr_ratio:.2f}"],
            ["🔥 单笔期望值 (Expectancy)", f"{expectancy:.4f} U"],
            ["🔥 利润因子 (Profit Factor)", f"{pf:.2f}"],
            ["⚠️ 最大连亏 (Max Loss Streak)", f"{int(max_loss_streak)} 笔"],
            ["累计净利润", f"{total_pnl:.2f} U"],
            ["最大回撤金额", f"{max_drawdown:.2f} U"]
        ]
        
        print("\n📊 【全局性能指标】")
        print(tabulate(summary_data, headers=["指标", "数值"], tablefmt="grid"))

        # --- 3. 信号质量验证 (Score 拆解) ---
        if "score" in self.df.columns:
            print("\n🎯 【按信号质量 (Score) 盈利分析】")
            score_analysis = self.df.groupby("score").agg(
                笔数=('pnl', 'count'),
                胜率=('pnl', lambda x: (x > 0).mean() * 100),
                总利润=('pnl', 'sum'),
                平均利润=('pnl', 'mean')
            ).reset_index()
            
            score_analysis['胜率'] = score_analysis['胜率'].apply(lambda x: f"{x:.1f}%")
            score_analysis['总利润'] = score_analysis['总利润'].apply(lambda x: f"{x:.2f}")
            score_analysis['平均利润'] = score_analysis['平均利润'].apply(lambda x: f"{x:.2f}")
            print(tabulate(score_analysis, headers="keys", tablefmt="pretty", showindex=False))

        # --- 4. 自动化系统健康诊断 ---
        print("\n💡 【系统状态自动诊断】")
        if total_trades < 50:
            print("⏳ [样本不足] 当前交易不足 50 笔，指标存在随机性，必须继续 Dry-run 积累数据。")
        else:
            if expectancy > 0 and pf >= 1.5 and max_drawdown < abs(total_pnl) * 0.5:
                print("✅ [系统健康] 期望值为正，PF>1.5，回撤可控。具备正向 Edge，可以准备切入小资金实盘！")
            elif expectancy > 0 and pf >= 1.0:
                print("⚠️ [勉强及格] 系统微利，但抗风险能力极差。建议查看 Score 分析，提高入场门槛。")
            else:
                print("❌ [必亏警报] 期望值为负或 PF<1。不要投入任何实盘资金！必须重新砍策略或过滤垃圾信号。")

if __name__ == "__main__":
    dashboard = TradeDashboard()
    dashboard.run_analysis()


