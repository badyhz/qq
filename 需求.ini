# core/data_feed.py
# ============================================
# 数据源模块（支持模拟 + WebSocket）
# ============================================

import random
import threading
import time
import json
import websocket


class DataFeed:
    def __init__(self, config):
        self.config = config

        self.symbol = config.get("symbol", "BTCUSDT").lower()
        self.mode = config.get("data_mode", "mock")  # mock / websocket

        # 当前价格
        self.current_price = 30000
        self.current_volume = 1

        # WebSocket 状态
        self.ws = None
        self.connected = False

        # 启动数据源
        if self.mode == "websocket":
            self._start_websocket()
        else:
            print("🟡 使用模拟行情（Mock Data）")

    # ============================================
    # 外部接口：获取最新数据
    # ============================================
    def get_latest(self):
        if self.mode == "mock":
            return self._mock_data()

        elif self.mode == "websocket":
            return {
                "price": self.current_price,
                "volume": self.current_volume
            }

        return {"price": None}

    # ============================================
    # 模拟行情（用于Dry-run）
    # ============================================
    def _mock_data(self):
        # 随机波动
        delta = random.uniform(-30, 30)
        self.current_price += delta

        # 防止价格崩掉
        if self.current_price < 1000:
            self.current_price = 1000

        self.current_volume = random.uniform(0.5, 5)

        return {
            "price": self.current_price,
            "volume": self.current_volume
        }

    # ============================================
    # WebSocket 启动
    # ============================================
    def _start_websocket(self):
        print("🔌 启动 WebSocket 数据源...")

        url = f"wss://stream.binance.com:9443/ws/{self.symbol}@trade"

        def run():
            while True:
                try:
                    self.ws = websocket.WebSocketApp(
                        url,
                        on_message=self._on_message,
                        on_error=self._on_error,
                        on_close=self._on_close,
                        on_open=self._on_open
                    )

                    self.ws.run_forever()
                except Exception as e:
                    print("❌ WebSocket 异常:", e)

                print("🔁 5秒后重连...")
                time.sleep(5)

        thread = threading.Thread(target=run)
        thread.daemon = True
        thread.start()

    # ============================================
    # WebSocket 回调
    # ============================================
    def _on_message(self, ws, message):
        try:
            data = json.loads(message)

            # Binance trade stream
            price = float(data["p"])
            volume = float(data["q"])

            self.current_price = price
            self.current_volume = volume

        except Exception as e:
            print("⚠️ 解析数据失败:", e)

    def _on_error(self, ws, error):
        print("❌ WebSocket 错误:", error)

    def _on_close(self, ws, close_status_code, close_msg):
        self.connected = False
        print("🔌 WebSocket 已断开")

    def _on_open(self, ws):
        self.connected = True
        print("✅ WebSocket 已连接")
