✅ indicators.py（升级版）
import numpy as np

def ema(prices, period):
    weights = np.exp(np.linspace(-1., 0., period))
    weights /= weights.sum()
    return np.convolve(prices, weights, mode='valid')[-1]

def vwap(prices, volumes):
    return np.sum(prices * volumes) / np.sum(volumes)

def std(prices):
    return np.std(prices)
