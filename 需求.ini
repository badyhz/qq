from datetime import datetime


class ExecutionEngine:
    def __init__(self, config, order_manager, logger):
        self.config = config
        self.mode = config.get("mode", "dry-run")

        self.order_manager = order_manager
        self.logger = logger

        # 将 logger 注入 order_manager（关键闭环）
        self.order_manager.set_logger(self.logger)

        print(f"⚙️ 执行引擎初始化完成 | 模式: {self.mode}")

    # ============================================
    # 开空（核心执行函数）
    # ============================================
    def open_short(self, position, signal):
        try:
            entry = position["entry"]
            size = position["size"]
            stop = position["stop"]
            tp = signal["tp"]
            score = signal.get("score", 0)

            # 基础校验
            if size <= 0:
                print("⚠️ 仓位为0，跳过开仓")
                return

            # ========================================
            # DRY-RUN 模式（当前使用）
            # ========================================
            if self.mode == "dry-run":
                print("\n🟡 [DRY-RUN] 准备开空单")
                print(f"时间: {datetime.now()}")
                print(f"价格: {entry:.2f}")
                print(f"仓位: {size:.6f}")
                print(f"止损: {stop:.2f}")
                print(f"止盈: {tp:.2f}")
                print(f"Score: {score}")
                print("-" * 40)

                # 调用订单管理器（真正记录持仓）
                self.order_manager.open_position(position, signal)

            # ========================================
            # LIVE 模式（未来扩展）
            # ========================================
            elif self.mode == "live":
                print("🔴 [LIVE] 实盘下单（未实现）")
                # TODO: 接入交易所 API（Binance）
                pass

            else:
                print(f"❌ 未知模式: {self.mode}")

        except Exception as e:
            print("❌ 执行开仓失败:", str(e))

    # ============================================
    # 手动强平（预留功能）
    # ============================================
    def force_close(self, reason="MANUAL"):
        if self.order_manager.position is None:
            print("⚠️ 当前无持仓，无法强平")
            return

        current_price = self.order_manager.position["entry_price"]

        print(f"⚠️ 手动强平 | 原因: {reason}")

        # 强制触发平仓
        self.order_manager._close_position(
            exit_price=current_price,
            pnl=0,
            reason=reason
        )
