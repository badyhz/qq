四、代码实现（可直接用）
✅ portfolio_manager.py
class PortfolioManager:
    def __init__(self, config):
        self.balance = 100  # 初始资金
        self.max_risk = 0.05  # 最大总风险 5%
        self.positions = []

    def current_risk(self):
        return sum([p["risk"] for p in self.positions])

    def can_open(self, new_risk):
        return (self.current_risk() + new_risk) <= self.max_risk

    def allocate(self, signal):
        score = signal.get("score", 6)

        # 🎯 按评分分配风险
        if score >= 10:
            risk = 0.025
        elif score >= 8:
            risk = 0.02
        else:
            risk = 0.015

        # ❗限制总风险
        if not self.can_open(risk):
            return None

        return risk

    def add_position(self, symbol, risk, direction):
        self.positions.append({
            "symbol": symbol,
            "risk": risk,
            "direction": direction
        })

    def remove_position(self, symbol):
        self.positions = [p for p in self.positions if p["symbol"] != symbol]

    def same_direction_count(self, direction):
        return len([p for p in self.positions if p["direction"] == direction])
