import csv
import os
from datetime import datetime

class TradeLogger:
    def __init__(self):
        self.file = "trades.csv"

        if not os.path.exists(self.file):
            with open(self.file, "w", newline="") as f:
                writer = csv.writer(f)
                writer.writerow([
                    "time",
                    "symbol",
                    "direction",
                    "entry",
                    "exit",
                    "pnl",
                    "score",
                    "vwap_dev",
                    "funding",
                    "oi_change"
                ])

    def log(self, trade):
        with open(self.file, "a", newline="") as f:
            writer = csv.writer(f)
            writer.writerow([
                datetime.now(),
                trade["symbol"],
                trade["direction"],
                trade["entry"],
                trade["exit"],
                trade["pnl"],
                trade["score"],
                trade["vwap_dev"],
                trade["funding"],
                trade["oi_change"]
            ])
