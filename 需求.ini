✅ scanner.py
from binance.client import Client
import numpy as np

class Scanner:
    def __init__(self, config):
        self.client = Client(
            config["binance"]["api_key"],
            config["binance"]["api_secret"]
        )
        self.symbols = []

    def fetch_symbols(self):
        tickers = self.client.futures_ticker()

        candidates = []

        for t in tickers:
            symbol = t["symbol"]

            volume = float(t["quoteVolume"])
            change = abs(float(t["priceChangePercent"]))

            if volume > 10_000_000 and change > 2:
                candidates.append(symbol)

        return candidates

    def detect_extreme(self, symbol):
        klines = self.client.futures_klines(
            symbol=symbol,
            interval="5m",
            limit=50
        )

        prices = np.array([float(k[4]) for k in klines])

        mean = prices.mean()
        std = prices.std()
        price = prices[-1]

        if price > mean + 2 * std:
            return True

        return False

    def scan(self):
        symbols = self.fetch_symbols()

        watchlist = []

        for s in symbols:
            try:
                if self.detect_extreme(s):
                    watchlist.append(s)
            except:
                continue

        return watchlist
