4️⃣ signal_engine.py（简化策略 + score）
import numpy as np

class SignalEngine:
    def __init__(self):
        self.prices = []

    def generate(self, market):
        price = market["price"]
        self.prices.append(price)

        if len(self.prices) < 30:
            return {"action": "NONE"}

        avg = np.mean(self.prices[-20:])
        std = np.std(self.prices[-20:])

        score = 0

        if price > avg + 2 * std:
            score += 2
        if price < avg:
            score += 2

        if score >= 3:
            return {
                "action": "SHORT",
                "entry": price,
                "stop": price * 1.01,
                "tp": avg,
                "score": score
            }

        return {"action": "NONE"}
5️⃣ risk_manager.py
class RiskManager:
    def __init__(self, config):
        self.balance = 100
        self.risk = config["risk"]["risk_per_trade"]

    def calculate_position(self, signal):
        entry = signal["entry"]
        stop = signal["stop"]

        risk_amount = self.balance * self.risk
        loss_per_unit = abs(entry - stop)

        size = risk_amount / loss_per_unit

        return {
            "size": size,
            "entry": entry,
            "stop": stop
        }
