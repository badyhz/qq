✅ risk_manager.py
def calculate_position(self, signal, risk_pct):
    entry = signal["entry"]
    stop = signal["stop"]

    risk_amount = self.balance * risk_pct
    loss_per_unit = abs(entry - stop)

    size = risk_amount / loss_per_unit

    return {
        "size": size,
        "entry": entry,
        "stop": stop
    }
