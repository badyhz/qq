# ============================================
# 交易记录模块（生成 trades.csv）
# ============================================

import csv
import os
from datetime import datetime


class TradeLogger:
    def __init__(self, config):
        self.config = config

        # 文件路径
        self.file_path = "trades.csv"

        # CSV 字段（必须和 dashboard 对齐）
        self.fieldnames = [
            "trade_id",
            "side",

            "entry_price",
            "exit_price",
            "size",

            "pnl",

            "score",

            "entry_time",
            "exit_time",
            "duration_sec",

            "exit_reason"
        ]

        # 初始化文件
        self._init_file()

    # ============================================
    # 初始化 CSV 文件
    # ============================================
    def _init_file(self):
        if not os.path.exists(self.file_path):
            print("📁 创建 trades.csv 文件")

            with open(self.file_path, mode="w", newline="") as f:
                writer = csv.DictWriter(f, fieldnames=self.fieldnames)
                writer.writeheader()

    # ============================================
    # 写入交易记录
    # ============================================
    def log_trade(self, trade_data):
        try:
            # 数据标准化
            row = self._format_trade(trade_data)

            # 写入 CSV
            with open(self.file_path, mode="a", newline="") as f:
                writer = csv.DictWriter(f, fieldnames=self.fieldnames)
                writer.writerow(row)

            print("📝 已写入 trades.csv")

        except Exception as e:
            print("❌ 写入交易日志失败：", str(e))

    # ============================================
    # 数据格式统一
    # ============================================
    def _format_trade(self, trade):
        return {
            "trade_id": trade.get("trade_id"),
            "side": trade.get("side"),

            "entry_price": round(trade.get("entry_price", 0), 6),
            "exit_price": round(trade.get("exit_price", 0), 6),
            "size": round(trade.get("size", 0), 6),

            "pnl": round(trade.get("pnl", 0), 6),

            "score": trade.get("score", 0),

            "entry_time": self._format_time(trade.get("entry_time")),
            "exit_time": self._format_time(trade.get("exit_time")),
            "duration_sec": round(trade.get("duration_sec", 0), 2),

            "exit_reason": trade.get("exit_reason")
        }

    # ============================================
    # 时间格式转换
    # ============================================
    def _format_time(self, t):
        if isinstance(t, datetime):
            return t.strftime("%Y-%m-%d %H:%M:%S")
        return str(t)
