from utils.indicators import ema, vwap, std

class SignalEngine:
    def __init__(self):
        self.prices = []
        self.volumes = []
        self.state = "IDLE"

    def generate(self, market):
        if market["price"] is None:
            return {"action": "NONE"}

        self.prices.append(market["price"])
        self.volumes.append(market["volume"])

        if len(self.prices) < 50:
            return {"action": "NONE"}

        price = market["price"]

        ema21 = ema(self.prices, 21)
        vw = vwap(self.prices, self.volumes)
        sd = std(self.prices)

        upper_band = vw + 2 * sd

        # 🧠 状态机
        if self.state == "IDLE":
            if price > upper_band:
                self.state = "ARMED"

        elif self.state == "ARMED":
            if price < ema21 and price < upper_band:
                self.state = "TRIGGERED"

                return {
                    "action": "SHORT",
                    "entry": price,
                    "stop": price * 1.01,
                    "tp": vw
                }

        return {"action": "NONE"}
