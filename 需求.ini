from binance.client import Client

class Exchange:
    def __init__(self, config):
        self.client = Client(
            config["binance"]["api_key"],
            config["binance"]["api_secret"]
        )
        self.symbol = config["symbol"]

    def get_position(self):
        positions = self.client.futures_position_information(symbol=self.symbol)
        for p in positions:
            if float(p["positionAmt"]) != 0:
                return {
                    "amt": float(p["positionAmt"]),
                    "entry": float(p["entryPrice"])
                }
        return None

    def get_open_orders(self):
        return self.client.futures_get_open_orders(symbol=self.symbol)
✅ 2️⃣ order_guard.py（核心安全模块）
class OrderGuard:
    def __init__(self, exchange):
        self.exchange = exchange

    def check_and_fix(self):
        pos = self.exchange.get_position()

        if not pos:
            return

        orders = self.exchange.get_open_orders()

        has_sl = False
        has_tp = False

        for o in orders:
            if o["type"] == "STOP_MARKET":
                has_sl = True
            if o["type"] == "TAKE_PROFIT_MARKET":
                has_tp = True

        # ❗没有止损 → 立刻补
        if not has_sl:
            print("⚠️ 无止损，立即补单")
            self._place_sl(pos)

        # 可选：没有止盈 → 补
        if not has_tp:
            print("⚠️ 无止盈，补单")
            self._place_tp(pos)

    def _place_sl(self, pos):
        stop_price = pos["entry"] * 1.01

        self.exchange.client.futures_create_order(
            symbol=self.exchange.symbol,
            side="BUY" if pos["amt"] < 0 else "SELL",
            type="STOP_MARKET",
            stopPrice=round(stop_price, 2),
            closePosition=True,
            workingType="MARK_PRICE"
        )

    def _place_tp(self, pos):
        tp_price = pos["entry"] * 0.98

        self.exchange.client.futures_create_order(
            symbol=self.exchange.symbol,
            side="BUY" if pos["amt"] < 0 else "SELL",
            type="TAKE_PROFIT_MARKET",
            stopPrice=round(tp_price, 2),
            closePosition=True,
            workingType="MARK_PRICE"
        )
✅ 3️⃣ FailSafe（终极兜底机制）
class FailSafe:
    def __init__(self, exchange):
        self.exchange = exchange

    def emergency_check(self, market_price):
        pos = self.exchange.get_position()

        if not pos:
            return

        entry = pos["entry"]

        # ❗极端偏离（比如超过3%）
        if abs(market_price - entry) / entry > 0.03:
            print("🚨 极端风险，强制平仓")

            self.exchange.client.futures_create_order(
                symbol=self.exchange.symbol,
                side="BUY" if pos["amt"] < 0 else "SELL",
                type="MARKET",
                quantity=abs(pos["amt"])
            )
