from utils.indicators import ema

class SignalEngine:
    def __init__(self):
        self.prices = []

    def generate(self, market, state):
        self.prices.append(market["price"])

        if len(self.prices) < 30:
            return {"action": "NONE"}

        ema21 = ema(self.prices, 21)

        price = market["price"]

        # 简化版：破 EMA21 做空
        if price < ema21:
            return {
                "action": "SHORT",
                "entry": price,
                "stop": price * 1.01
            }

        return {"action": "NONE"}
