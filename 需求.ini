# core/signal_engine.py
# ============================================
# 信号引擎（策略核心 + Score评分系统）
# ============================================

import numpy as np


class SignalEngine:
    def __init__(self, config):
        self.config = config

        # 价格缓存
        self.prices = []
        self.volumes = []

        # 参数（可调）
        self.window = 50
        self.vwap_window = 20

        # 触发阈值
        self.zscore_threshold = 2.0

    # ============================================
    # 主入口：生成信号
    # ============================================
    def generate(self, market):
        price = market["price"]
        volume = market.get("volume", 1)

        self.prices.append(price)
        self.volumes.append(volume)

        # 数据不足
        if len(self.prices) < self.window:
            return {"action": "NONE"}

        # 计算指标
        mean = np.mean(self.prices[-self.window:])
        std = np.std(self.prices[-self.window:])
        zscore = (price - mean) / std if std > 0 else 0

        vwap = self._calculate_vwap()
        vwap_dev = price - vwap

        # Score 评分系统
        score = 0

        # ========================================
        # 1️⃣ 极端偏离（核心）
        # ========================================
        if zscore > 2:
            score += 3
        elif zscore > 1.5:
            score += 2

        # ========================================
        # 2️⃣ VWAP 偏离
        # ========================================
        if vwap_dev > std:
            score += 2
        elif vwap_dev > std * 0.5:
            score += 1

        # ========================================
        # 3️⃣ 动量衰减（假突破）
        # ========================================
        if len(self.prices) >= 5:
            recent = self.prices[-5:]
            if recent[-1] < recent[-2]:
                score += 1

        # ========================================
        # 触发条件
        # ========================================
        if score >= 4:
            return self._build_short_signal(price, mean, std, score, zscore, vwap)

        return {"action": "NONE"}

    # ============================================
    # 构建做空信号
    # ============================================
    def _build_short_signal(self, price, mean, std, score, zscore, vwap):
        entry = price

        # 止损（上方）
        stop = price + std

        # 止盈（回归均值）
        tp = mean

        return {
            "action": "SHORT",
            "entry": entry,
            "stop": stop,
            "tp": tp,

            "score": score,

            # 用于后续分析（很关键）
            "meta": {
                "zscore": zscore,
                "vwap": vwap,
                "mean": mean,
                "std": std
            }
        }

    # ============================================
    # VWAP 计算
    # ============================================
    def _calculate_vwap(self):
        prices = self.prices[-self.vwap_window:]
        volumes = self.volumes[-self.vwap_window:]

        if sum(volumes) == 0:
            return prices[-1]

        return sum(p * v for p, v in zip(prices, volumes)) / sum(volumes)
