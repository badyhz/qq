import websocket
import json
import threading

class DataFeed:
    def __init__(self, symbol="btcusdt"):
        self.symbol = symbol.lower()
        self.ws_url = f"wss://fstream.binance.com/ws/{self.symbol}@kline_5m"

        self.price = None
        self.volume = None
        self.kline_closed = False

        self.start()

    def on_message(self, ws, message):
        data = json.loads(message)

        k = data["k"]

        self.price = float(k["c"])
        self.volume = float(k["v"])
        self.kline_closed = k["x"]  # 是否收盘

    def start(self):
        def run():
            ws = websocket.WebSocketApp(
                self.ws_url,
                on_message=self.on_message
            )
            ws.run_forever()

        thread = threading.Thread(target=run)
        thread.daemon = True
        thread.start()

    def get_latest(self):
        return {
            "price": self.price,
            "volume": self.volume,
            "closed": self.kline_closed
        }
