from binance.client import Client
from binance.enums import *

class ExecutionEngine:
    def __init__(self, config, order_mgr):
        self.mode = config["mode"]
        self.symbol = config["symbol"]
        self.order_mgr = order_mgr

        self.client = Client(
            config["binance"]["api_key"],
            config["binance"]["api_secret"]
        )

    def open_short(self, position, signal):
        if not self.order_mgr.can_open():
            print("已有持仓，跳过")
            return

        qty = round(position["size"], 3)

        if self.mode == "dry-run":
            print(f"[DRY] SHORT {qty} @ {position['entry']}")
            return

        try:
            # 1️⃣ 开空（市价）
            order = self.client.futures_create_order(
                symbol=self.symbol,
                side=SIDE_SELL,
                type=ORDER_TYPE_MARKET,
                quantity=qty
            )

            print("开空成功:", order)

            # 2️⃣ 止损（STOP_MARKET）
            stop_price = round(position["stop"], 2)

            sl_order = self.client.futures_create_order(
                symbol=self.symbol,
                side=SIDE_BUY,
                type=FUTURE_ORDER_TYPE_STOP_MARKET,
                stopPrice=stop_price,
                closePosition=True
            )

            print("止损挂单:", sl_order)

            self.order_mgr.in_position = True

        except Exception as e:
            print("下单失败:", e)
