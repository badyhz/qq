from utils.indicators import ema, vwap, std
import numpy as np

class SignalEngine:
    def __init__(self):
        self.prices = []
        self.volumes = []
        self.state = "IDLE"

    def generate(self, market):
        if market["price"] is None:
            return {"action": "NONE"}

        self.prices.append(market["price"])
        self.volumes.append(market["volume"])

        if len(self.prices) < 50:
            return {"action": "NONE"}

        price = market["price"]

        ema21 = ema(self.prices, 21)
        vw = vwap(self.prices, self.volumes)
        sd = std(self.prices)

        upper_band = vw + 2 * sd
        vol_ma = np.mean(self.volumes[-20:])

        score = 0

        # 🧠 1️⃣ VWAP 偏离
        if price > vw + 3 * sd:
            score += 3
        elif price > upper_band:
            score += 2

        # 🧠 2️⃣ EMA 破位
        if price < ema21:
            score += 2

        # 🧠 3️⃣ 成交量
        if market["volume"] > 2 * vol_ma:
            score += 2
        elif market["volume"] > vol_ma:
            score += 1

        # 🧠 4️⃣ K线结构（简单版）
        body = abs(self.prices[-1] - self.prices[-2])
        avg_body = np.mean(np.abs(np.diff(self.prices[-10:])))
        if body > avg_body:
            score += 2

        # 🧠 5️⃣ 波动率
        if sd > np.mean(self.prices[-20:]) * 0.01:
            score += 1

        # ❗过滤（震荡）
        if sd < 0.002 * price:
            score -= 2

        # 🎯 决策
        if score >= 6:
            return {
                "action": "SHORT",
                "entry": price,
                "stop": price * 1.01,
                "tp": vw,
                "score": score
            }

        return {"action": "NONE"}
