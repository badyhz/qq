# ============================================
# 持仓管理 + 止盈止损 + 交易闭环
# ============================================

from datetime import datetime


class OrderManager:
    def __init__(self, config):
        self.config = config

        # 当前持仓（只允许单仓）
        self.position = None

        # 交易ID计数器
        self.trade_id = 0

        # 日志器（由 execution 注入）
        self.logger = None

    # ============================================
    # 外部注入 logger（避免循环依赖）
    # ============================================
    def set_logger(self, logger):
        self.logger = logger

    # ============================================
    # 是否允许开仓
    # ============================================
    def can_open(self):
        return self.position is None

    # ============================================
    # 开仓（由 execution 调用）
    # ============================================
    def open_position(self, position_data, signal):
        self.trade_id += 1

        self.position = {
            "trade_id": self.trade_id,
            "side": "SHORT",

            "entry_price": position_data["entry"],
            "stop_price": position_data["stop"],
            "tp_price": signal["tp"],

            "size": position_data["size"],
            "score": signal.get("score", 0),

            "entry_time": datetime.now(),

            # 扩展字段（用于分析）
            "meta": {
                "signal": signal
            }
        }

        print("\n🚀 开仓成功（模拟）")
        print(f"ID: {self.trade_id}")
        print(f"方向: SHORT")
        print(f"价格: {self.position['entry_price']:.2f}")
        print(f"止损: {self.position['stop_price']:.2f}")
        print(f"止盈: {self.position['tp_price']:.2f}")
        print(f"仓位: {self.position['size']:.4f}")
        print(f"Score: {self.position['score']}")
        print("=" * 40)

    # ============================================
    # 更新持仓（每个 tick 调用）
    # ============================================
    def update_fake_position(self, current_price):
        if self.position is None:
            return

        entry = self.position["entry_price"]
        stop = self.position["stop_price"]
        tp = self.position["tp_price"]
        size = self.position["size"]
        trade_id = self.position["trade_id"]

        # ========================================
        # SHORT 逻辑
        # ========================================

        # 1️⃣ 止损触发（价格上涨）
        if current_price >= stop:
            pnl = (entry - stop) * size  # 负值

            print(f"\n❌ 止损触发 | ID: {trade_id}")
            print(f"入场: {entry:.2f} → 止损: {stop:.2f}")
            print(f"PnL: {pnl:.2f} U")

            self._close_position(current_price, pnl, "STOP_LOSS")
            return

        # 2️⃣ 止盈触发（价格下跌）
        if current_price <= tp:
            pnl = (entry - tp) * size  # 正值

            print(f"\n✅ 止盈触发 | ID: {trade_id}")
            print(f"入场: {entry:.2f} → 止盈: {tp:.2f}")
            print(f"PnL: {pnl:.2f} U")

            self._close_position(current_price, pnl, "TAKE_PROFIT")
            return

    # ============================================
    # 平仓逻辑
    # ============================================
    def _close_position(self, exit_price, pnl, reason):
        if self.position is None:
            return

        trade = self.position

        trade_record = {
            "trade_id": trade["trade_id"],
            "side": trade["side"],

            "entry_price": trade["entry_price"],
            "exit_price": exit_price,

            "size": trade["size"],
            "pnl": pnl,

            "score": trade["score"],

            "entry_time": trade["entry_time"],
            "exit_time": datetime.now(),

            "duration_sec": (datetime.now() - trade["entry_time"]).total_seconds(),

            "exit_reason": reason
        }

        # ========================================
        # 写入日志
        # ========================================
        if self.logger:
            self.logger.log_trade(trade_record)
        else:
            print("⚠️ 未设置 logger，交易未记录")

        print("📊 交易已记录")
        print("=" * 50)

        # 清空持仓
        self.position = None
