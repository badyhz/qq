# main.py
# ============================================
# 量化交易系统主入口（完整版）
# ============================================

import time
import yaml
import traceback
from datetime import datetime

# 核心模块
from core.data_feed import DataFeed
from core.signal_engine import SignalEngine
from core.risk_manager import RiskManager
from core.execution import ExecutionEngine
from core.order_manager import OrderManager
from core.trade_logger import TradeLogger

# ============================================
# 初始化系统
# ============================================

print("🚀 正在启动量化交易系统...")

# 读取配置
with open("config.yaml", "r") as f:
    config = yaml.safe_load(f)

# 初始化模块
data_feed = DataFeed(config)
signal_engine = SignalEngine(config)
risk_manager = RiskManager(config)
order_manager = OrderManager(config)
trade_logger = TradeLogger(config)

execution_engine = ExecutionEngine(
    config=config,
    order_manager=order_manager,
    logger=trade_logger
)

print("✅ 系统初始化完成")
print(f"🕒 启动时间: {datetime.now()}")
print(f"⚙️ 模式: {config['mode']}")
print("=" * 50)

# ============================================
# 主循环
# ============================================

LOOP_INTERVAL = 1  # 秒
HEARTBEAT_INTERVAL = 30  # 心跳打印间隔

last_heartbeat = time.time()

while True:
    try:
        loop_start = time.time()

        # ====================================
        # 1️⃣ 获取市场数据
        # ====================================
        market = data_feed.get_latest()

        if market["price"] is None:
            continue

        price = market["price"]

        # ====================================
        # 2️⃣ 更新订单状态（模拟持仓）
        # ====================================
        order_manager.update_fake_position(price)

        # ====================================
        # 3️⃣ 生成交易信号
        # ====================================
        signal = signal_engine.generate(market)

        # ====================================
        # 4️⃣ 执行交易逻辑
        # ====================================
        if signal["action"] == "SHORT":

            # 是否允许开仓
            if not order_manager.can_open():
                print("⚠️ 已有持仓，跳过开仓")
            else:
                # 计算仓位
                position = risk_manager.calculate_position(signal)

                # 执行开仓
                execution_engine.open_short(position, signal)

        # ====================================
        # 5️⃣ 心跳日志（系统状态）
        # ====================================
        now = time.time()
        if now - last_heartbeat > HEARTBEAT_INTERVAL:
            print(f"💓 系统运行中 | 当前价格: {price:.2f} | 时间: {datetime.now()}")
            last_heartbeat = now

        # ====================================
        # 6️⃣ 控制循环频率
        # ====================================
        elapsed = time.time() - loop_start
        sleep_time = max(0, LOOP_INTERVAL - elapsed)
        time.sleep(sleep_time)

    except KeyboardInterrupt:
        print("\n🛑 手动停止系统")
        break

    except Exception as e:
        print("❌ 系统异常：", str(e))
        traceback.print_exc()

        # 防止疯狂报错
        time.sleep(5)
