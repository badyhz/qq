from binance.enums import *

def open_short(self, position, signal):
    if not self.order_mgr.can_open():
        return

    qty = round(position["size"], 3)
    entry = position["entry"]
    stop = round(position["stop"], 2)

    # 👉 止盈（VWAP 或固定比例）
    take_profit = round(entry * 0.98, 2)  # 示例：2%

    if self.mode == "dry-run":
        print(f"[DRY] SHORT {qty} @ {entry}")
        print(f"[DRY] SL {stop} TP {take_profit}")
        return

    try:
        # 1️⃣ 开空
        self.client.futures_create_order(
            symbol=self.symbol,
            side=SIDE_SELL,
            type=ORDER_TYPE_MARKET,
            quantity=qty
        )

        # 2️⃣ 止损（交易所级）
        self.client.futures_create_order(
            symbol=self.symbol,
            side=SIDE_BUY,
            type="STOP_MARKET",
            stopPrice=stop,
            closePosition=True,
            workingType="MARK_PRICE"
        )

        # 3️⃣ 止盈（交易所级）
        self.client.futures_create_order(
            symbol=self.symbol,
            side=SIDE_BUY,
            type="TAKE_PROFIT_MARKET",
            stopPrice=take_profit,
            closePosition=True,
            workingType="MARK_PRICE"
        )

        print("下单完成（带SL/TP）")

        self.order_mgr.in_position = True

    except Exception as e:
        print("下单失败:", e)
