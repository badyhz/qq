name: Deploy QQ Trading Bot

on:
  push:
    branches: [ main, master ]
    paths-ignore:
      - 'README.md'
      - 'docs/**'
      - '**.md'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      environment:
        description: '部署环境'
        required: true
        default: 'staging'
        type: choice
        options:
        - staging
        - production
      force_deploy:
        description: '强制部署（跳过测试）'
        required: false
        default: false
        type: boolean

env:
  PYTHON_VERSION: '3.11'
  APP_NAME: 'qq-trading-bot'

jobs:
  test:
    name: Run Tests
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pytest pytest-asyncio
        
    - name: Run static analysis
      run: |
        pip install flake8 black mypy
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics
        black --check .
        mypy . --ignore-missing-imports
        
    - name: Run unit tests
      if: ${{ !github.event.inputs.force_deploy }}
      run: |
        # 创建测试配置文件
        cat > config.test.yaml << EOF
mode: "dry-run"
data_mode: "mock"
timeframe: "5m"
runtime:
  loop_interval_seconds: 0.1
  max_loops: 10
portfolio:
  max_open_positions: 1
risk:
  starting_balance_usdt: 1000
  risk_per_trade: 0.01
strategy:
  lookback: 10
  ema_period: 5
EOF
        
        # 运行测试
        python -m pytest tests/ -v --tb=short
        
    - name: Upload test results
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: test-results
        path: |
          test-reports/
          .pytest_cache/

  build:
    name: Build Deployment Package
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Create deployment package
      run: |
        # 创建版本标签
        VERSION=$(date +%Y%m%d_%H%M%S)_${GITHUB_SHA:0:8}
        echo "VERSION=$VERSION" >> $GITHUB_ENV
        
        # 创建部署包
        tar -czf ${{ env.APP_NAME }}_$VERSION.tar.gz \
          --exclude ".github" \
          --exclude ".git" \
          --exclude ".venv" \
          --exclude "__pycache__" \
          --exclude "*.pyc" \
          --exclude "*.swp" \
          --exclude "*.log" \
          --exclude "logs" \
          --exclude "data" \
          --exclude ".DS_Store" \
          --exclude "._*" \
          .
          
        # 计算文件哈希
        sha256sum ${{ env.APP_NAME }}_$VERSION.tar.gz > ${{ env.APP_NAME }}_$VERSION.sha256
        
    - name: Upload deployment package
      uses: actions/upload-artifact@v4
      with:
        name: deployment-package
        path: |
          ${{ env.APP_NAME }}_*.tar.gz
          ${{ env.APP_NAME }}_*.sha256
        retention-days: 7

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' || (github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging')
    environment: staging
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
        
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.STAGING_SSH_PRIVATE_KEY }}
        
    - name: Deploy to staging server
      run: |
        # 获取最新的部署包
        DEPLOY_PACKAGE=$(ls ${{ env.APP_NAME }}_*.tar.gz | head -1)
        
        # 验证文件完整性
        sha256sum -c ${{ env.APP_NAME }}_*.sha256
        
        # 部署到测试服务器
        scp -o StrictHostKeyChecking=no \
            $DEPLOY_PACKAGE \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }}:/tmp/
            
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/deploy.sh /tmp/$DEPLOY_PACKAGE staging"
            
    - name: Run health check
      run: |
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.STAGING_SERVER_USER }}@${{ secrets.STAGING_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/health_check.sh"
            
    - name: Send deployment notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          Staging环境部署${{ job.status }}
          版本: ${{ env.VERSION }}
          提交: ${{ github.sha }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [test, build, deploy-staging]
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'production'
    environment: production
    
    steps:
    - name: Download deployment package
      uses: actions/download-artifact@v4
      with:
        name: deployment-package
        
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
        
    - name: Confirm production deployment
      if: github.event.inputs.force_deploy != 'true'
      run: |
        echo "🚀 准备部署到生产环境"
        echo "版本: ${{ env.VERSION }}"
        echo "提交: ${{ github.sha }}"
        echo ""
        echo "请在5分钟内确认部署..."
        sleep 300
        
    - name: Deploy to production server
      run: |
        # 获取最新的部署包
        DEPLOY_PACKAGE=$(ls ${{ env.APP_NAME }}_*.tar.gz | head -1)
        
        # 验证文件完整性
        sha256sum -c ${{ env.APP_NAME }}_*.sha256
        
        # 部署到生产服务器（蓝绿部署）
        scp -o StrictHostKeyChecking=no \
            $DEPLOY_PACKAGE \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }}:/tmp/
            
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/deploy.sh /tmp/$DEPLOY_PACKAGE production"
            
    - name: Run production health check
      run: |
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/health_check.sh"
            
    - name: Verify trading functionality
      run: |
        # 等待应用程序完全启动
        sleep 30
        
        # 检查交易功能
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/verify_trading.sh"
            
    - name: Send production deployment notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          🚀 生产环境部署${{ job.status }}
          版本: ${{ env.VERSION }}
          提交: ${{ github.sha }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}

  rollback:
    name: Rollback Deployment
    runs-on: ubuntu-latest
    if: failure() && (github.event_name == 'workflow_dispatch')
    
    steps:
    - name: Setup SSH
      uses: webfactory/ssh-agent@v0.8.0
      with:
        ssh-private-key: ${{ secrets.PRODUCTION_SSH_PRIVATE_KEY }}
        
    - name: Execute rollback
      run: |
        ssh -o StrictHostKeyChecking=no \
            ${{ secrets.PRODUCTION_SERVER_USER }}@${{ secrets.PRODUCTION_SERVER_HOST }} \
            "sudo -u qqbot /opt/qq-bot/scripts/rollback.sh"
            
    - name: Send rollback notification
      if: always()
      uses: 8398a7/action-slack@v3
      with:
        status: ${{ job.status }}
        text: |
          🔄 部署回滚${{ job.status }}
          环境: ${{ github.event.inputs.environment }}
        webhook_url: ${{ secrets.SLACK_WEBHOOK }}