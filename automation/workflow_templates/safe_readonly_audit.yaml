name: SAFE_READONLY_AUDIT
description: "Audit non-frozen scripts for guard eligibility."
mode: DAG

inputs:
  candidate_scripts:
    type: "list[str]"
    required: true
    description: "Scripts to audit"
  frozen_files:
    type: "list[str]"
    required: true
    description: "Files that must not be modified"

outputs:
  eligible:
    type: "list[str]"
    description: "Scripts approved for guard injection"
  not_eligible:
    type: "list[str]"
    description: "Scripts rejected"

parallel_policy:
  mode: DAG
  max_agents: 5
  rules:
    - "Independent reads: unlimited"
    - "Different files: parallel safe"
    - "Same file: sequential"

tasks:
  - id: scan_candidates
    deps: []
  - id: check_frozen
    deps: [scan_candidates]
  - id: classify_imports
    deps: [scan_candidates]
  - id: risk_assessment
    deps: [classify_imports]
  - id: batch_recommendation
    deps: [risk_assessment, check_frozen]

validation_checklist:
  - "Script exists in scripts/ directory"
  - "Has main() function"
  - "Not in frozen list"
  - "No high-risk imports"
  - "Not already guarded"

stop_conditions:
  - "Frozen file detected in candidates"
  - "Script has high-risk imports"
  - "Script already guarded"

anti_patterns:
  - "Skip frozen exclusion check"
  - "Assume scripts are safe without reading"
  - "Batch too many scripts (>5)"
